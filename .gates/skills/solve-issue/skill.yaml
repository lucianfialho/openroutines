id: solve-issue
name: Solve GitHub Issue
description: Takes a GitHub issue, implements the fix/feature in an isolated git worktree, verifies, and opens a PR.

inputs:
  required:
    - name: repo
      type: string
      description: owner/repo slug
    - name: issue_number
      type: integer
      description: Issue number to solve

initial_state: fetch_issue

states:
  fetch_issue:
    description: Fetch issue details from GitHub
    agent_prompt: |
      Fetch issue #{{inputs.issue_number}} from {{inputs.repo}}.
      Use the github_fetch_issue tool to get title, body, and labels.

      Use emit_output with content containing the YAML:
        issue:
          number: integer
          title: string
          body: string
          labels: [string]
    tools:
      - github_fetch_issue
      - emit_output
    transitions:
      - to: analyze

  analyze:
    description: Analyze issue and plan implementation
    agent_prompt: |
      Issue title: {{outputs.fetch_issue.issue.title}}
      Issue body: {{outputs.fetch_issue.issue.body}}

      Read src/app.ts to understand the current code.
      Create a plan to implement EXACTLY what the issue body describes above.
      Pay special attention to the exact endpoint path, response format, and any specific fields mentioned.

      Use emit_output:
        content: |
          plan:
            summary: "{{outputs.fetch_issue.issue.title}}"
            files_to_modify:
              - src/app.ts
            files_to_create: []
            test_strategy: "curl http://localhost:3003<endpoint-path-from-issue>"
    tools:
      - read_file
      - write_file
      - emit_output
      - run_shell
    transitions:
      - to: create_worktree

  create_worktree:
    description: Create isolated git worktree for development
    agent_prompt: |
      Create a git worktree for isolated development.
      Use git_create_worktree with branch: feat/issue-{{inputs.issue_number}}-<short-slug>
      Store the returned path and branch for all subsequent file operations.

      Use emit_output with content containing the YAML:
        worktree:
          path: string
          branch: string
    tools:
      - git_create_worktree
      - write_file
      - emit_output
    transitions:
      - to: implement

  implement:
    description: Write code changes in the worktree
    agent_prompt: |
      Issue title: {{outputs.fetch_issue.issue.title}}
      Issue body: {{outputs.fetch_issue.issue.body}}

      Read src/app.ts from worktree {{outputs.create_worktree.worktree.path}}.
      Implement EXACTLY what the issue body describes above.
      Do NOT add any endpoint that is not explicitly requested.
      Do NOT change any existing functionality.

      CRITICAL: Use edit_file (NOT write_file) to make changes.
      Use edit_file with operation type "insert_after" to add the new endpoint after an existing endpoint.
      For example, insert after:
        search: "  // Health check"
        content: |
          \n  app.get(\"/new-endpoint\", (_req, res) => { ... });\n

      Use emit_output:
        content: |
          changes:
            - file: src/app.ts
              action: modified
              description: "{{outputs.fetch_issue.issue.title}}"
    tools:
      - read_file
      - edit_file
      - emit_output
      - run_shell
    transitions:
      - to: verify

  verify:
    description: Run tests and lint in the worktree
    agent_prompt: |
      CRITICAL: Run tests FIRST, then emit output.

      Step 1: Use run_shell with cwd {{outputs.create_worktree.worktree.path}} to run:
        - npm test -- --run
        - npx tsc --noEmit

      Step 2: Only AFTER tests run, call emit_output with:
        content: |
          verification:
            tests_passed: true | false
            typecheck_passed: true | false
            lint_passed: true | false
            notes: <any notes>
    tools:
      - run_shell
      - write_file
      - emit_output
      - read_file
    transitions:
      - to: pr_gate

  pr_gate:
    description: Human approval before creating PR
    gate: manual_approval
    transitions:
      - to: commit_and_push

  commit_and_push:
    description: Commit changes and push branch from worktree
    agent_prompt: |
      CRITICAL: You MUST call git_commit_and_push BEFORE calling emit_output.

      Step 1: Call git_commit_and_push with:
        - cwd: {{outputs.create_worktree.worktree.path}}
        - message: "feat: {{outputs.fetch_issue.issue.title}} (closes #{{inputs.issue_number}})"

      Step 2: Only AFTER git_commit_and_push succeeds, call emit_output with:
        content: |
          commit:
            committed: true
            pushed: true
            branch: <branch from git_commit_and_push result>
    tools:
      - git_commit_and_push
      - emit_output
    transitions:
      - to: create_pr

  create_pr:
    description: Create pull request on GitHub
    agent_prompt: |
      CRITICAL: Create the PR FIRST, then remove worktree, then emit output.

      Step 1: Call github_create_pull_request with:
        - branch: {{outputs.commit_and_push.commit.branch}}
        - title: "feat: {{outputs.fetch_issue.issue.title}}"
        - body: "Closes #{{inputs.issue_number}}"

      Step 2: Call git_remove_worktree with:
        - cwd: {{outputs.create_worktree.worktree.path}}
        - branch: {{outputs.create_worktree.worktree.branch}}

      Step 3: Only AFTER both succeed, call emit_output with:
        content: |
          pr:
            url: <url from github_create_pull_request>
            number: <number from github_create_pull_request>
            branch: {{outputs.commit_and_push.commit.branch}}
    tools:
      - github_create_pull_request
      - git_remove_worktree
      - emit_output
    transitions:
      - to: done

  done:
    terminal: true
