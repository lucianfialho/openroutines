id: solve-issue
name: Solve GitHub Issue
description: Takes a GitHub issue, explores the codebase dynamically, implements the fix/feature in an isolated git worktree, verifies, and opens a PR.

inputs:
  required:
    - name: repo
      type: string
      description: owner/repo slug
    - name: issue_number
      type: integer
      description: Issue number to solve

initial_state: fetch_issue

states:
  fetch_issue:
    description: Fetch issue details from GitHub
    agent_prompt: |
      Fetch issue #{{inputs.issue_number}} from {{inputs.repo}}.
      Use the github_fetch_issue tool to get title, body, and labels.

      Use emit_output with content containing the YAML:
        issue:
          number: integer
          title: string
          body: string
          labels: [string]
    tools:
      - github_fetch_issue
      - emit_output
    transitions:
      - to: analyze

  analyze:
    description: Dynamically analyze codebase and discover which files to touch
    agent_prompt: |
      Issue title: {{outputs.fetch_issue.issue.title}}
      Issue body: {{outputs.fetch_issue.issue.body}}

      EXPLORE the codebase dynamically. Do NOT assume which files need to change.
      Use run_shell to find relevant files (e.g., find . -name "*.ts" | grep -v node_modules | grep -v dist).
      Read the files that seem most relevant to the issue.
      
      Create a plan that lists ONLY the files that actually need to be modified or created.
      Pay special attention to the exact requirements from the issue body.

      Use emit_output:
        content: |
          plan:
            summary: "<brief summary of what needs to be done>"
            files_to_modify:
              - "<relative path to file 1>"
              - "<relative path to file 2>"
            files_to_create:
              - "<relative path to new file 1>"
            test_strategy: "<how to verify the change>"
    tools:
      - read_file
      - write_file
      - emit_output
      - run_shell
    transitions:
      - to: create_worktree

  create_worktree:
    description: Create isolated git worktree for development
    agent_prompt: |
      Create a git worktree for isolated development.
      Use git_create_worktree with branch: feat/issue-{{inputs.issue_number}}-<short-slug>
      Store the returned path and branch for all subsequent file operations.

      Use emit_output with content containing the YAML:
        worktree:
          path: string
          branch: string
    tools:
      - git_create_worktree
      - write_file
      - emit_output
    transitions:
      - to: implement

  implement:
    description: Write code changes in the worktree based on the dynamic plan
    agent_prompt: |
      Issue title: {{outputs.fetch_issue.issue.title}}
      Issue body: {{outputs.fetch_issue.issue.body}}

      Plan summary: {{outputs.analyze.plan.summary}}
      Files to modify: {{outputs.analyze.plan.files_to_modify}}
      Files to create: {{outputs.analyze.plan.files_to_create}}
      Worktree: {{outputs.create_worktree.worktree.path}}

      Read EACH file from the plan (use the worktree path).
      Implement EXACTLY what the issue body describes.
      Do NOT add functionality that is not explicitly requested.
      Do NOT change any existing functionality unless required.

      CRITICAL: Use edit_file (NOT write_file) to make changes to existing files.
      Use write_file for new files.

      Use emit_output:
        content: |
          changes:
            - file: "<relative path>"
              action: modified | created
              description: "<what changed>"
    tools:
      - read_file
      - edit_file
      - write_file
      - emit_output
      - run_shell
    transitions:
      - to: review

  review:
    description: Review the diff before running tests
    agent_prompt: |
      Issue title: {{outputs.fetch_issue.issue.title}}
      Issue body: {{outputs.fetch_issue.issue.body}}

      Read EACH file that was modified or created according to the changes output.
      Review the changes carefully. Check for:

      1. Does the change match EXACTLY what the issue asked for?
      2. Were changes made ONLY to the files listed in the plan?
      3. Is there any syntax error or broken logic?
      4. Was any existing functionality accidentally modified?
      5. Are there any duplicate declarations or redundant code?

      If everything looks correct, emit_output:
        content: |
          review:
            verdict: approved
            notes: "Code looks correct"

      If you find problems, emit_output:
        content: |
          review:
            verdict: rejected
            notes: "<describe the problem clearly so the implement agent can fix it>"
    tools:
      - read_file
      - emit_output
    transitions:
      - to: verify
        when: output.review.review.verdict == "approved"
      - to: implement
        when: output.review.review.verdict == "rejected"

  verify:
    description: Run tests and lint in the worktree
    agent_prompt: |
      CRITICAL: Run tests FIRST, then emit output.

      Step 1: Use run_shell with cwd {{outputs.create_worktree.worktree.path}} to run:
        - npm test -- --run
        - npx tsc --noEmit

      Step 2: Only AFTER tests run, call emit_output with:
        content: |
          verification:
            tests_passed: true | false
            typecheck_passed: true | false
            lint_passed: true | false
            notes: <any notes>
    tools:
      - run_shell
      - write_file
      - emit_output
      - read_file
    transitions:
      - to: pr_gate

  pr_gate:
    description: Human approval before creating PR
    gate: manual_approval
    transitions:
      - to: commit_and_push

  commit_and_push:
    description: Commit changes and push branch from worktree
    agent_prompt: |
      CRITICAL: You MUST call git_commit_and_push BEFORE calling emit_output.

      Step 1: Call git_commit_and_push with:
        - cwd: {{outputs.create_worktree.worktree.path}}
        - message: "feat: {{outputs.fetch_issue.issue.title}} (closes #{{inputs.issue_number}})"

      Step 2: Only AFTER git_commit_and_push succeeds, call emit_output with:
        content: |
          commit:
            committed: true
            pushed: true
            branch: <branch from git_commit_and_push result>
    tools:
      - git_commit_and_push
      - emit_output
    transitions:
      - to: create_pr

  create_pr:
    description: Create pull request on GitHub
    agent_prompt: |
      CRITICAL: Create the PR FIRST, then remove worktree, then emit output.

      Step 1: Call github_create_pull_request with:
        - branch: {{outputs.commit_and_push.commit.branch}}
        - title: "feat: {{outputs.fetch_issue.issue.title}}"
        - body: "Closes #{{inputs.issue_number}}"

      Step 2: Call git_remove_worktree with:
        - cwd: {{outputs.create_worktree.worktree.path}}
        - branch: {{outputs.create_worktree.worktree.branch}}

      Step 3: Only AFTER both succeed, call emit_output with:
        content: |
          pr:
            url: <url from github_create_pull_request>
            number: <number from github_create_pull_request>
            branch: {{outputs.commit_and_push.commit.branch}}
    tools:
      - github_create_pull_request
      - git_remove_worktree
      - emit_output
    transitions:
      - to: done

  done:
    terminal: true
