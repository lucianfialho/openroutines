id: daily-pr-review
triggers:
  - type: schedule
    cron: "0 9 * * 1-5"
  - type: github
    events: [pull_request.opened]
pipeline:
  skill: pr-review
environment:
  network: { mode: trusted }
connectors:
  - name: github
    source: .gates/connectors/github/connector.yaml
gates:
  - security_review
