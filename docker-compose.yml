version: "3.8"

services:
  app:
    build: .
    ports:
      - "3003:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PROJECT_ROOT=/repo
      - WORKTREE_BASE=/tmp/or-worktrees
      - DATABASE_URL=postgresql://openroutines:openroutines@postgres:5432/openroutines
      - REDIS_URL=redis://redis:6379
      - KIMI_API_KEY=${KIMI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/repo:rw
      - ./routines:/app/routines:ro
      - ./.gates:/app/.gates:ro
      - worktrees:/tmp/or-worktrees

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openroutines
      POSTGRES_PASSWORD: openroutines
      POSTGRES_DB: openroutines
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  redis_data:
  worktrees:
